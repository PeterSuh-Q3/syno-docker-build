name: Build and Push (6.2)

# Publishes the fat image dante90/syno-compiler:6.2 (all DSM 6.2 platforms).
# DSM 6.2 toolchains come from SourceForge; build-parallel-62.sh takes NO
# version argument (its first argument is the command).

on:
  workflow_dispatch:
    inputs:
      push_to_hub:
        description: 'Push to Docker Hub'
        required: true
        default: true
        type: boolean
      tag_latest:
        description: 'Also tag as :latest'
        required: true
        default: false
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_NAME: dante90/syno-compiler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-6.2-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-6.2-

      - name: Cache Synology toolkits
        uses: actions/cache@v3
        with:
          path: cache/
          key: synology-toolkit-6.2-${{ hashFiles('build-parallel-62.sh') }}
          restore-keys: |
            synology-toolkit-6.2-

      - name: Build image (all platforms)
        run: |
          chmod +x build-parallel-62.sh
          export MAX_PARALLEL_JOBS=6
          export TAG_LATEST=${{ github.event.inputs.tag_latest || 'false' }}
          echo "🚀 Building ${IMAGE_NAME}:6.2 (fat image, all platforms)"
          ./build-parallel-62.sh all

      - name: Push to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        run: |
          docker push ${{ env.IMAGE_NAME }}:6.2
          echo "✅ Pushed ${{ env.IMAGE_NAME }}:6.2"

          if [ "${{ github.event.inputs.tag_latest }}" = "true" ]; then
            docker push ${{ env.IMAGE_NAME }}:latest
            echo "✅ Pushed ${{ env.IMAGE_NAME }}:latest"
          else
            echo "ℹ️  Skipping :latest (tag_latest=false)"
          fi
