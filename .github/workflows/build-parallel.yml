name: Build and Push Synology Compiler (Performance Optimized)

# Publishes ONE fat image per DSM version: dante90/syno-compiler:{dsm}
# (contains every platform for that DSM; the platform is chosen at `docker run`
# time via `compile-module <platform>`). This matches the tags consumed
# downstream (:7.1 / :7.2 / :7.3 ...). Parallelism is in the toolchain
# downloads (MAX_PARALLEL_JOBS), not in per-platform image tags.

on:
  workflow_dispatch:
    inputs:
      dsm_version:
        description: 'DSM Version'
        required: true
        default: '7.3'
        type: choice
        options:
          - '7.0'
          - '7.1'
          - '7.2'
          - '7.3'
          - '7.4'
      push_to_hub:
        description: 'Push to Docker Hub'
        required: true
        default: true
        type: boolean
      tag_latest:
        description: 'Also tag as :latest'
        required: true
        default: false
        type: boolean

env:
  REGISTRY: docker.io
  IMAGE_NAME: dante90/syno-compiler

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.event.inputs.dsm_version }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.event.inputs.dsm_version }}-

      - name: Cache Synology toolkits
        uses: actions/cache@v3
        with:
          path: cache/
          key: synology-toolkit-${{ github.event.inputs.dsm_version }}-${{ hashFiles('build-parallel.sh') }}
          restore-keys: |
            synology-toolkit-${{ github.event.inputs.dsm_version }}-

      - name: Build image (all platforms)
        run: |
          chmod +x build-parallel.sh
          DSM_VER="${{ github.event.inputs.dsm_version || '7.3' }}"
          export MAX_PARALLEL_JOBS=6
          export TAG_LATEST=${{ github.event.inputs.tag_latest || 'false' }}
          echo "🚀 Building ${IMAGE_NAME}:${DSM_VER} (fat image, all platforms)"
          ./build-parallel.sh "${DSM_VER}" all

      - name: Push to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        run: |
          DSM_VER="${{ github.event.inputs.dsm_version || '7.3' }}"
          docker push ${{ env.IMAGE_NAME }}:${DSM_VER}
          echo "✅ Pushed ${{ env.IMAGE_NAME }}:${DSM_VER}"

          if [ "${{ github.event.inputs.tag_latest }}" = "true" ]; then
            docker push ${{ env.IMAGE_NAME }}:latest
            echo "✅ Pushed ${{ env.IMAGE_NAME }}:latest"
          else
            echo "ℹ️  Skipping :latest (tag_latest=false)"
          fi
