name: Build and Push Synology Compiler (Performance Optimized)

on:
  workflow_dispatch:
    inputs:
      dsm_version:
        description: 'DSM Version'
        required: true
        default: '7.3'
        type: choice
        options:
          - '7.1'
          - '7.2'
          - '7.3'
      platforms:
        description: 'Platforms to build ("all" or pick one)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'epyc7002'
          - 'geminilakenk'
          - 'r1000nk'
          - 'v1000nk'
          - 'apollolake'
          - 'avoton'
          - 'braswell'
          - 'broadwell'
          - 'broadwellnk'
          - 'broadwellnkv2'
          - 'broadwellntbap'
          - 'bromolow'
          - 'denverton'
          - 'geminilake'
          - 'purley'
          - 'r1000'
          - 'v1000'
      push_to_hub:
        description: 'Push to Docker Hub'
        required: true
        default: true
        type: boolean
      build_method:
        description: 'Build Method'
        required: true
        default: 'parallel'
        type: choice
        options:
          - 'parallel'
          - 'sequential'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: dante90/syno-compiler
  DSM_VERSION: ${{ github.event.inputs.dsm_version || '7.3' }}

jobs:
  # Setup job: resolve DSM version and generate dynamic platform matrix
  setup:
    runs-on: ubuntu-latest
    outputs:
      dsm_version: ${{ steps.resolve.outputs.dsm_version }}
      platform_matrix: ${{ steps.resolve.outputs.platform_matrix }}
      platform_list: ${{ steps.resolve.outputs.platform_list }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve DSM version and platforms
        id: resolve
        run: |
          chmod +x build-parallel.sh
          DSM_VER="${{ github.event.inputs.dsm_version || '7.3' }}"
          echo "dsm_version=${DSM_VER}" >> $GITHUB_OUTPUT

          # Get platform list as JSON array from the build script
          MATRIX_JSON=$(./build-parallel.sh "${DSM_VER}" platforms)
          echo "platform_matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT

          # Also output as space-separated list for build-all job
          PLATFORM_LIST=$(echo "${MATRIX_JSON}" | tr -d '[]"' | tr ',' ' ')
          echo "platform_list=${PLATFORM_LIST}" >> $GITHUB_OUTPUT

          echo "DSM Version: ${DSM_VER}"
          echo "Platforms: ${MATRIX_JSON}"

  # Matrix job to build platforms in parallel
  build-matrix:
    needs: [setup]
    if: github.event.inputs.platforms != 'all' && github.event.inputs.build_method == 'parallel'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.setup.outputs.platform_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache-${{ matrix.platform }}
          key: ${{ runner.os }}-buildx-${{ needs.setup.outputs.dsm_version }}-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ needs.setup.outputs.dsm_version }}-${{ matrix.platform }}-

      - name: Cache Synology toolkits
        uses: actions/cache@v3
        with:
          path: cache/
          key: synology-toolkit-${{ needs.setup.outputs.dsm_version }}-${{ matrix.platform }}-${{ hashFiles('build-parallel.sh') }}
          restore-keys: |
            synology-toolkit-${{ needs.setup.outputs.dsm_version }}-${{ matrix.platform }}-
            synology-toolkit-${{ needs.setup.outputs.dsm_version }}-

      - name: Make build script executable
        run: chmod +x build-parallel.sh

      - name: Prepare platform-specific build
        run: |
          echo "🚀 Building for DSM ${{ needs.setup.outputs.dsm_version }} / platform: ${{ matrix.platform }}"
          ./build-parallel.sh ${{ needs.setup.outputs.dsm_version }} prepare

      - name: Build Docker image for ${{ matrix.platform }}
        run: |
          ./build-parallel.sh ${{ needs.setup.outputs.dsm_version }} build ${{ matrix.platform }}

      - name: Push to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        run: |
          DSM_VER="${{ needs.setup.outputs.dsm_version }}"
          docker tag dante90/syno-compiler:${DSM_VER}-${{ matrix.platform }} ${{ env.IMAGE_NAME }}:${DSM_VER}-${{ matrix.platform }}
          docker push ${{ env.IMAGE_NAME }}:${DSM_VER}-${{ matrix.platform }}
          echo "✅ Pushed ${{ env.IMAGE_NAME }}:${DSM_VER}-${{ matrix.platform }}"

  # Single job for all platforms or sequential build
  build-all:
    needs: [setup]
    if: github.event.inputs.platforms == 'all' || github.event.inputs.build_method == 'sequential'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      - name: Log in to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ needs.setup.outputs.dsm_version }}-all-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ needs.setup.outputs.dsm_version }}-all-

      - name: Cache Synology toolkits
        uses: actions/cache@v3
        with:
          path: cache/
          key: synology-toolkit-${{ needs.setup.outputs.dsm_version }}-all-${{ hashFiles('build-parallel.sh') }}
          restore-keys: |
            synology-toolkit-${{ needs.setup.outputs.dsm_version }}-all-
            synology-toolkit-${{ needs.setup.outputs.dsm_version }}-

      - name: Make build script executable
        run: chmod +x build-parallel.sh

      - name: Build all platforms
        run: |
          DSM_VER="${{ needs.setup.outputs.dsm_version }}"
          echo "🚀 Building all platforms for DSM ${DSM_VER} with parallel optimization"
          export MAX_PARALLEL_JOBS=6
          ./build-parallel.sh ${DSM_VER} all

      - name: Push to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        run: |
          DSM_VER="${{ needs.setup.outputs.dsm_version }}"
          docker tag dante90/syno-compiler:${DSM_VER} ${{ env.IMAGE_NAME }}:${DSM_VER}
          docker tag dante90/syno-compiler:latest ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${DSM_VER}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "✅ Pushed ${{ env.IMAGE_NAME }}:${DSM_VER} and latest"

  # Optional: Multi-arch manifest combining all platform images
  build-multiarch:
    if: github.event.inputs.platforms == 'all' && github.event.inputs.push_to_hub == 'true'
    needs: [setup, build-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          DSM_VER="${{ needs.setup.outputs.dsm_version }}"
          PLATFORM_LIST="${{ needs.setup.outputs.platform_list }}"

          # Build the imagetools arguments dynamically
          IMAGES=""
          for PLAT in ${PLATFORM_LIST}; do
            IMAGES="${IMAGES} ${{ env.IMAGE_NAME }}:${DSM_VER}-${PLAT}"
          done

          docker buildx imagetools create \
            -t ${{ env.IMAGE_NAME }}:${DSM_VER}-multiarch \
            ${IMAGES}

          echo "✅ Created multi-arch manifest: ${{ env.IMAGE_NAME }}:${DSM_VER}-multiarch"
