name: Build and Push Synology Compiler 7.3

on:
  workflow_dispatch:
    inputs:
      push_to_hub:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: docker.io
  REPOSITORY: dante90/syno-compiler
  TOOLCHAIN_VERSION: 7.3
  PLATFORMS_K5: "epyc7002 geminilakenk r1000nk v1000nk"
  PLATFORMS_K4: "apollolake broadwell broadwellnk broadwellnkv2 broadwellntbap denverton geminilake kvmx64 purley r1000 v1000"

jobs:
  # ==========================================================
  # Job 1: Build kernel 5.10 platforms (4 platforms)
  # ==========================================================
  build-k5:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create opt/cache directory
        run: mkdir -p opt/cache

      - name: Download kernel 5.10 toolkits
        run: |
          set -e
          TOOLCHAIN_VERSION="${{ env.TOOLCHAIN_VERSION }}"
          BASE_URL="https://global.synologydownload.com/download/ToolChain/toolkit/${TOOLCHAIN_VERSION}"
          MAX_RETRIES=3
          TIMEOUT=30

          download_file() {
            local url=$1 output=$2 filename=$(basename "$output") attempt=1
            while [ $attempt -le $MAX_RETRIES ]; do
              echo "  [$attempt/${MAX_RETRIES}] Downloading ${filename}..."
              if curl -f -L --max-time $TIMEOUT -o "$output" "$url"; then
                echo "  ✓ Downloaded $(du -h "$output" | cut -f1)"
                return 0
              fi
              [ $attempt -lt $MAX_RETRIES ] && echo "  ⚠ Attempt $attempt failed, retrying..." && sleep 2
              ((attempt++))
            done
            echo "  ✗ Failed after ${MAX_RETRIES} attempts"
            return 1
          }

          echo "=== Downloading kernel 5.10 platforms ==="
          for PLATFORM in ${{ env.PLATFORMS_K5 }}; do
            echo "Processing platform: $PLATFORM"
            DEV_FILENAME="ds.${PLATFORM}-${TOOLCHAIN_VERSION}.dev.txz"
            if ! download_file "${BASE_URL}/${PLATFORM}/${DEV_FILENAME}" "opt/cache/${DEV_FILENAME}"; then
              echo "  ✗ Failed to download ${DEV_FILENAME}"
              exit 1
            fi
          done

          echo ""
          echo "Downloaded files:"
          ls -lh opt/cache/

      - name: Build and push image (kernel 5.10)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event.inputs.push_to_hub == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:latest
          build-args: |
            PLATFORMS=${{ env.PLATFORMS_K5 }}
            TOOLKIT_VER=${{ env.TOOLCHAIN_VERSION }}
          no-cache: true

      - name: Cleanup
        if: always()
        run: rm -rf opt/cache

  # ==========================================================
  # Job 2: Extend with kernel 4.4 platforms (11 platforms)
  # Uses Dockerfile.extend to build on top of 7.3-base image.
  #
