name: Build and Push Synology Compiler 7.3

on:
  workflow_dispatch:
    inputs:
      push_to_hub:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: docker.io
  REPOSITORY: dante90/syno-compiler
  TOOLCHAIN_VERSION: 7.3
  GCCLIB_VER: gcc1220_glibc236
  PLATFORMS: |
    apollolake:4.4.180
    avoton:3.10.108
    braswell:3.10.108
    broadwell:4.4.180
    broadwellnk:4.4.302
    broadwellnkv2:4.4.302
    broadwellntbap:4.4.302
    bromolow:3.10.108
    denverton:4.4.302
    epyc7002:5.10.55
    geminilake:4.4.302
    geminilakenk:5.10.55
    grantley:3.10.108
    kvmx64:4.4.302
    purley:4.4.302
    r1000:4.4.302
    r1000nk:5.10.55
    v1000:4.4.302
    v1000nk:5.10.55

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create opt/cache directory
        run: mkdir -p opt/cache

      - name: Download Synology Toolchains
        run: |
          set -e
          TOOLCHAIN_VERSION="${{ env.TOOLCHAIN_VERSION }}"
          GCCLIB_VER="${{ env.GCCLIB_VER }}"
          BASE_URL="https://global.synologydownload.com/download/ToolChain/toolchain/${TOOLCHAIN_VERSION}-86009"

          # Platform directory mappings
          declare -A PLATFORM_DIRS
          PLATFORM_DIRS[apollolake]="Intel%20x86%20Linux%204.4.180%20%28Apollolake%29"
          PLATFORM_DIRS[avoton]="Intel%20x86%20Linux%203.10.108%20%28Avoton%29"
          PLATFORM_DIRS[braswell]="Intel%20x86%20Linux%203.10.108%20%28Braswell%29"
          PLATFORM_DIRS[broadwell]="Intel%20x86%20Linux%204.4.180%20%28Broadwell%29"
          PLATFORM_DIRS[broadwellnk]="Intel%20x86%20Linux%204.4.302%20%28Broadwellnk%29"
          PLATFORM_DIRS[broadwellnkv2]="Intel%20x86%20Linux%204.4.302%20%28Broadwellnkv2%29"
          PLATFORM_DIRS[broadwellntbap]="Intel%20x86%20Linux%204.4.302%20%28Broadwellntbap%29"
          PLATFORM_DIRS[bromolow]="Intel%20x86%20linux%203.10.108%20%28Bromolow%29"
          PLATFORM_DIRS[denverton]="Intel%20x86%20Linux%204.4.302%20%28Denverton%29"
          PLATFORM_DIRS[epyc7002]="AMD%20x86%20Linux%20Linux%205.10.55%20%28epyc7002%29"
          PLATFORM_DIRS[geminilake]="Intel%20x86%20Linux%204.4.302%20%28GeminiLake%29"
          PLATFORM_DIRS[geminilakenk]="Intel%20x86%20Linux%205.10.55%20%28geminilakenk%29"
          PLATFORM_DIRS[grantley]="Intel%20x86%20Linux%203.10.108%20%28Grantley%29"
          PLATFORM_DIRS[kvmx64]="Intel%20x86%20Linux%204.4.302%20%28Kvmx64%29"
          PLATFORM_DIRS[purley]="Intel%20x86%20Linux%204.4.302%20%28Purley%29"
          PLATFORM_DIRS[r1000]="AMD%20x86%20Linux%204.4.302%20%28r1000%29"
          PLATFORM_DIRS[r1000nk]="AMD%20x86%20Linux%205.10.55%20%28r1000nk%29"
          PLATFORM_DIRS[v1000]="Intel%20x86%20Linux%204.4.302%20%28V1000%29"
          PLATFORM_DIRS[v1000nk]="AMD%20x86%20Linux%205.10.55%20%28v1000nk%29"

          # Download toolchains for each platform
          while IFS=':' read -r PLATFORM KVER; do
            [ -z "$PLATFORM" ] && continue
            PLATFORM=$(echo "$PLATFORM" | xargs)  # trim whitespace

            DIR="${PLATFORM_DIRS[$PLATFORM]}"
            if [ -z "$DIR" ]; then
              echo "Warning: No directory mapping for platform: $PLATFORM"
              continue
            fi

            echo "Downloading toolchain for: $PLATFORM"

            # Download ds.{platform}-{version}.dev.txz
            DS_FILENAME="ds.${PLATFORM}-${TOOLCHAIN_VERSION}.dev.txz"
            DS_URL="${BASE_URL}/${DIR}/${DS_FILENAME}"
            echo "  Downloading ${DS_FILENAME}..."
            if wget -q -O "opt/cache/${DS_FILENAME}" "${DS_URL}"; then
              echo "  ✓ Downloaded $(du -h opt/cache/${DS_FILENAME} | cut -f1)"
            else
              echo "  ⚠ Failed to download ${DS_FILENAME}"
            fi

            # Download {platform}-{gcclib}_x86_64-GPL.txz
            GCCLIB_FILENAME="${PLATFORM}-${GCCLIB_VER}_x86_64-GPL.txz"
            GCCLIB_URL="${BASE_URL}/${DIR}/${GCCLIB_FILENAME}"
            echo "  Downloading ${GCCLIB_FILENAME}..."
            if wget -q -O "opt/cache/${GCCLIB_FILENAME}" "${GCCLIB_URL}"; then
              echo "  ✓ Downloaded $(du -h opt/cache/${GCCLIB_FILENAME} | cut -f1)"
            else
              echo "  ⚠ Failed to download ${GCCLIB_FILENAME}"
            fi
          done <<< "${{ env.PLATFORMS }}"

          # Download linux kernel sources
          KVER_MAJORS="3 4 5"
          for KVER_MAJOR in $KVER_MAJORS; do
            LINUX_FILENAME="linux-${KVER_MAJOR}.x.txz"
            LINUX_URL="${BASE_URL}/${LINUX_FILENAME}"
            if [ ! -f "opt/cache/${LINUX_FILENAME}" ]; then
              echo "Downloading ${LINUX_FILENAME}..."
              if wget -q -O "opt/cache/${LINUX_FILENAME}" "${LINUX_URL}"; then
                echo "  ✓ Downloaded $(du -h opt/cache/${LINUX_FILENAME} | cut -f1)"
              else
                echo "  ⚠ ${LINUX_FILENAME} not found (optional)"
              fi
            fi
          done

          echo ""
          echo "Downloaded files:"
          ls -lah opt/cache/

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event.inputs.push_to_hub == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }}
            ${{ github.event.inputs.push_to_hub == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.REPOSITORY) || '' }}
          build-args: |
            PLATFORMS=${{ env.PLATFORMS }}
            TOOLKIT_VER=${{ env.TOOLCHAIN_VERSION }}
            GCCLIB_VER=${{ env.GCCLIB_VER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup cache
        if: always()
        run: rm -rf opt/cache

      - name: Create build summary
        if: always()
        run: |
          cat > /tmp/build-summary.md << 'EOF'
          # Synology Compiler 7.3 Build Summary

          **Status**: ${{ job.status }}
          **Timestamp**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ## Image Details
          - **Repository**: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}
          - **Tags**:
            - ${{ env.TOOLCHAIN_VERSION }}
            - latest
          - **Base Image**: debian:9-slim
          - **Toolchain Version**: ${{ env.TOOLCHAIN_VERSION }}

          ## Supported Platforms (x86_64)
          ${{ env.PLATFORMS }}

          ## Usage
          \`\`\`bash
          # List available platforms
          docker run --rm ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }} list

          # Compile modules for a specific platform
          docker run -u $(id -u) --rm -it \
            -v /path/to/source:/input \
            -v /path/to/output:/output \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }} \
            compile-module {platform}

          # Interactive shell with platform environment
          docker run -u $(id -u) --rm -it \
            -v /path/to/work:/input \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }} \
            shell broadwell
          \`\`\`

          EOF
          cat /tmp/build-summary.md

      - name: Upload build summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-summary
          path: /tmp/build-summary.md
