name: Build and Push Synology Compiler 7.3

on:
  workflow_dispatch:
    inputs:
      push_to_hub:
        description: 'Push to Docker Hub'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: docker.io
  REPOSITORY: dante90/syno-compiler
  TOOLCHAIN_VERSION: 7.3
  PLATFORMS: "apollolake broadwell broadwellnk broadwellnkv2 broadwellntbap denverton epyc7002 geminilake geminilakenk kvmx64 purley r1000 r1000nk v1000 v1000nk"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    timeout-minutes: 120

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event.inputs.push_to_hub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create opt/cache directory
        run: mkdir -p opt/cache

      - name: Download Synology Toolkits
        run: |
          set -e
          TOOLCHAIN_VERSION="${{ env.TOOLCHAIN_VERSION }}"
          BASE_URL="https://global.synologydownload.com/download/ToolChain/toolkit/${TOOLCHAIN_VERSION}"
          MAX_RETRIES=3
          TIMEOUT=30

          echo "Downloading Synology Toolkit ${TOOLCHAIN_VERSION}"
          echo "Base URL: ${BASE_URL}"
          echo "Retries: ${MAX_RETRIES}, Timeout: ${TIMEOUT}s"
          echo ""

          # Function to download file with retries
          download_file() {
            local url=$1
            local output=$2
            local filename=$(basename "$output")
            local attempt=1

            while [ $attempt -le $MAX_RETRIES ]; do
              echo "  [$attempt/${MAX_RETRIES}] Downloading ${filename}..."
              if curl -f -L --max-time $TIMEOUT -o "$output" "$url"; then
                SIZE=$(du -h "$output" | cut -f1)
                echo "  ✓ Downloaded ${SIZE}"
                return 0
              fi

              if [ $attempt -lt $MAX_RETRIES ]; then
                echo "  ⚠ Attempt $attempt failed, retrying..."
                sleep 2
              fi
              ((attempt++))
            done

            echo "  ✗ Failed after ${MAX_RETRIES} attempts"
            return 1
          }

          # Download toolkits for each platform
          for V in ${{ env.PLATFORMS }}; do
            IFS=':' read -r PLATFORM <<< "$V"
            [ -z "$PLATFORM" ] && continue

            echo "Processing platform: $PLATFORM"

            # Download ds.{platform}-{version}.dev.txz
            DEV_FILENAME="ds.${PLATFORM}-${TOOLCHAIN_VERSION}.dev.txz"
            DEV_URL="${BASE_URL}/${PLATFORM}/${DEV_FILENAME}"

            if ! download_file "$DEV_URL" "opt/cache/${DEV_FILENAME}"; then
              echo "  ✗ Failed to download ${DEV_FILENAME}"
              exit 1
            fi
          done

          echo ""
          echo "All downloaded files:"
          ls -lh opt/cache/

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event.inputs.push_to_hub == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }}
            ${{ github.event.inputs.push_to_hub == 'true' && format('{0}/{1}:latest', env.REGISTRY, env.REPOSITORY) || '' }}
          build-args: |
            PLATFORMS=${{ env.PLATFORMS }}
            TOOLKIT_VER=${{ env.TOOLCHAIN_VERSION }}
          no-cache: true

      - name: Cleanup cache
        if: always()
        run: rm -rf opt/cache

      - name: Create build summary
        if: always()
        run: |
          cat > /tmp/build-summary.md << 'EOF'
          # Synology Compiler 7.3 Build Summary

          **Status**: ${{ job.status }}
          **Timestamp**: $(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ## Image Details
          - **Repository**: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}
          - **Tags**:
            - ${{ env.TOOLCHAIN_VERSION }}
            - latest
          - **Base Image**: debian:12-slim
          - **Toolkit Version**: ${{ env.TOOLCHAIN_VERSION }}

          ## Supported Platforms (x86_64)
          ${{ env.PLATFORMS }}

          ## Usage
          \`\`\`bash
          # List available platforms
          docker run --rm ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }} list

          # Compile modules for a specific platform
          docker run -u $(id -u) --rm -it \
            -v /path/to/source:/input \
            -v /path/to/output:/output \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }} \
            compile-module {platform}

          # Interactive shell with platform environment
          docker run -u $(id -u) --rm -it \
            -v /path/to/work:/input \
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.TOOLCHAIN_VERSION }} \
            shell broadwell
          \`\`\`

          EOF
          cat /tmp/build-summary.md

      - name: Upload build summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-summary
          path: /tmp/build-summary.md
